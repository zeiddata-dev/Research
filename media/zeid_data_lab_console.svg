<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Zeid Data animated lab console</title>
  <desc id="desc">Animated security lab console banner with robot mascot, scan lines, and evidence-first status text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="45%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .scan { animation: scan 5s linear infinite; }
      .blink { animation: blink 1.4s steps(2, start) infinite; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; }
      .float { animation: float 4s ease-in-out infinite; }
      .dash { stroke-dasharray: 10 16; animation: dash 12s linear infinite; }
      @keyframes scan {
        0% { transform: translateY(-80px); opacity: .05; }
        45% { opacity: .25; }
        100% { transform: translateY(360px); opacity: .05; }
      }
      @keyframes blink {
        0%, 45% { opacity: 1; }
        46%, 100% { opacity: .25; }
      }
      @keyframes pulse {
        0%, 100% { opacity: .7; }
        50% { opacity: 1; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      @keyframes dash {
        to { stroke-dashoffset: -240; }
      }
      text { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    </style>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#bg)"/>
  <rect x="22" y="22" width="1156" height="276" rx="22" fill="none" stroke="#334155" stroke-width="2"/>
  <rect class="scan" x="30" y="0" width="1140" height="72" fill="#22d3ee"/>

  <g opacity=".42">
    <path class="dash" d="M80 250 C210 180, 310 285, 430 210 S660 180, 760 230 S970 260, 1120 185" fill="none" stroke="url(#neon)" stroke-width="3"/>
    <path class="dash" d="M82 84 H1120" fill="none" stroke="#22d3ee" stroke-width="2" opacity=".35"/>
    <path class="dash" d="M82 116 H1120" fill="none" stroke="#a855f7" stroke-width="2" opacity=".25"/>
  </g>

  <g class="float" filter="url(#glow)">
    <rect x="82" y="82" width="170" height="134" rx="26" fill="#0f172a" stroke="#22d3ee" stroke-width="4"/>
    <rect x="116" y="50" width="102" height="42" rx="18" fill="#111827" stroke="#22c55e" stroke-width="4"/>
    <circle cx="134" cy="143" r="14" fill="#22d3ee"/>
    <circle cx="200" cy="143" r="14" fill="#22c55e"/>
    <rect x="126" y="176" width="82" height="12" rx="6" fill="#a855f7"/>
    <line x1="167" y1="50" x2="167" y2="24" stroke="#22c55e" stroke-width="5" stroke-linecap="round"/>
    <circle class="blink" cx="167" cy="18" r="8" fill="#22c55e"/>
  </g>

  <text x="300" y="102" fill="#e5e7eb" font-size="48" font-weight="700">ZEID DATA RESEARCH</text>
  <text x="304" y="145" fill="#93c5fd" font-size="22">security lab · analytics tooling · automation · detection engineering</text>

  <g class="pulse">
    <text x="304" y="194" fill="#22c55e" font-size="24">$ ./labctl verify --evidence-first</text>
    <text x="304" y="232" fill="#f8fafc" font-size="20">status: public-safe · links: real · robot: mostly supervised</text>
  </g>

  <g transform="translate(930 74)">
    <rect width="186" height="142" rx="18" fill="#020617" stroke="#475569" stroke-width="2"/>
    <circle cx="28" cy="32" r="7" fill="#22c55e"/>
    <circle cx="52" cy="32" r="7" fill="#f97316"/>
    <circle cx="76" cy="32" r="7" fill="#a855f7"/>
    <text x="24" y="74" fill="#e2e8f0" font-size="16">TRACE</text>
    <text x="24" y="102" fill="#22d3ee" font-size="16">VALIDATE</text>
    <text x="24" y="130" fill="#22c55e" font-size="16">SHIP</text>
  </g>
</svg>
