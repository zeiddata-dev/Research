<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Cisco banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#061a2b"/>
      <stop offset="52%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00bceb"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      text { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .scan { animation: scan 7s linear infinite; }
      .pulse { animation: pulse 3.8s ease-in-out infinite; }
      .dash { stroke-dasharray: 12 18; animation: dash 16s linear infinite; }
      @keyframes scan { 0% { transform: translateY(-80px); opacity:.04; } 50% { opacity:.18; } 100% { transform: translateY(330px); opacity:.04; } }
      @keyframes pulse { 0%,100% { opacity:.72; } 50% { opacity:1; } }
      @keyframes dash { to { stroke-dashoffset:-260; } }
    </style>
  </defs>
  <rect width="1200" height="300" rx="28" fill="url(#bg)"/>
  <rect x="20" y="20" width="1160" height="260" rx="22" fill="none" stroke="#334155" stroke-width="2"/>
  <rect class="scan" x="32" y="0" width="1136" height="70" fill="#38bdf8"/>
  <path class="dash" d="M70 228 C190 170, 290 260, 430 192 S645 162, 780 220 S990 238, 1130 154" fill="none" stroke="url(#line)" stroke-width="3" opacity=".55"/>
  <path d="M74 76 H1126" stroke="url(#line)" stroke-width="2" opacity=".42"/>
  <path d="M74 246 H1126" stroke="url(#line)" stroke-width="2" opacity=".26"/>
  <g filter="url(#glow)" class="pulse">
    <rect x="72" y="86" width="114" height="114" rx="24" fill="#020617" stroke="#00bceb" stroke-width="3"/>
    <path d="M106 174 L151 126 H111 L137 92" fill="none" stroke="#38bdf8" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="164" cy="100" r="7" fill="#2563eb"/>
    <circle cx="94" cy="190" r="5" fill="#00bceb"/>
  </g>
  <text x="225" y="118" font-size="42" font-weight="800" fill="#f8fafc">Cisco</text>
  <text x="228" y="158" font-size="20" fill="#cbd5e1">Cisco-focused detection packs, security evidence, and operational guidance.</text>
  <text x="228" y="202" font-size="18" fill="#38bdf8">ZEID DATA · CISCO · PUBLIC-SAFE</text>
  <text x="228" y="232" font-size="14" fill="#94a3b8">workbooks/Security Operations Playbooks/Cisco</text>
  <g><circle cx="922" cy="92" r="4" fill="#38bdf8" opacity=".35"/><circle cx="1012" cy="94" r="4" fill="#38bdf8" opacity=".35"/><circle cx="1034" cy="83" r="2" fill="#38bdf8" opacity=".35"/><circle cx="858" cy="93" r="2" fill="#38bdf8" opacity=".35"/><circle cx="1028" cy="82" r="4" fill="#38bdf8" opacity=".35"/><circle cx="852" cy="85" r="3" fill="#38bdf8" opacity=".35"/><circle cx="896" cy="185" r="4" fill="#38bdf8" opacity=".35"/><circle cx="965" cy="100" r="5" fill="#38bdf8" opacity=".35"/><circle cx="875" cy="104" r="2" fill="#38bdf8" opacity=".35"/><circle cx="951" cy="135" r="2" fill="#38bdf8" opacity=".35"/><circle cx="928" cy="187" r="2" fill="#38bdf8" opacity=".35"/><circle cx="987" cy="109" r="5" fill="#38bdf8" opacity=".35"/><circle cx="1030" cy="120" r="2" fill="#38bdf8" opacity=".35"/><circle cx="948" cy="95" r="5" fill="#38bdf8" opacity=".35"/><circle cx="1062" cy="123" r="3" fill="#38bdf8" opacity=".35"/><circle cx="997" cy="109" r="4" fill="#38bdf8" opacity=".35"/><circle cx="1022" cy="157" r="5" fill="#38bdf8" opacity=".35"/><circle cx="1022" cy="154" r="4" fill="#38bdf8" opacity=".35"/></g>
  <rect x="932" y="88" width="184" height="112" rx="18" fill="#020617" stroke="#475569" stroke-width="2" opacity=".84"/>
  <text x="958" y="126" font-size="16" fill="#00bceb">TRACE</text>
  <text x="958" y="156" font-size="16" fill="#38bdf8">VALIDATE</text>
  <text x="958" y="186" font-size="16" fill="#2563eb">DOCUMENT</text>
</svg>
