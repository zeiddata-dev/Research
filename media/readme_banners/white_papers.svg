<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="White Papers banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="52%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e5e7eb"/>
      <stop offset="50%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      text { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .scan { animation: scan 7s linear infinite; }
      .pulse { animation: pulse 3.8s ease-in-out infinite; }
      .dash { stroke-dasharray: 12 18; animation: dash 16s linear infinite; }
      @keyframes scan { 0% { transform: translateY(-80px); opacity:.04; } 50% { opacity:.18; } 100% { transform: translateY(330px); opacity:.04; } }
      @keyframes pulse { 0%,100% { opacity:.72; } 50% { opacity:1; } }
      @keyframes dash { to { stroke-dashoffset:-260; } }
    </style>
  </defs>
  <rect width="1200" height="300" rx="28" fill="url(#bg)"/>
  <rect x="20" y="20" width="1160" height="260" rx="22" fill="none" stroke="#334155" stroke-width="2"/>
  <rect class="scan" x="32" y="0" width="1136" height="70" fill="#94a3b8"/>
  <path class="dash" d="M70 228 C190 170, 290 260, 430 192 S645 162, 780 220 S990 238, 1130 154" fill="none" stroke="url(#line)" stroke-width="3" opacity=".55"/>
  <path d="M74 76 H1126" stroke="url(#line)" stroke-width="2" opacity=".42"/>
  <path d="M74 246 H1126" stroke="url(#line)" stroke-width="2" opacity=".26"/>
  <g filter="url(#glow)" class="pulse">
    <rect x="72" y="86" width="114" height="114" rx="24" fill="#020617" stroke="#e5e7eb" stroke-width="3"/>
    <path d="M106 174 L151 126 H111 L137 92" fill="none" stroke="#94a3b8" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="164" cy="100" r="7" fill="#38bdf8"/>
    <circle cx="94" cy="190" r="5" fill="#e5e7eb"/>
  </g>
  <text x="225" y="118" font-size="42" font-weight="800" fill="#f8fafc">White Papers</text>
  <text x="228" y="158" font-size="20" fill="#cbd5e1">Long-form research, technical analysis, and public-safe writeups.</text>
  <text x="228" y="202" font-size="18" fill="#94a3b8">ZEID DATA · WHITEPAPERS · PUBLIC-SAFE</text>
  <text x="228" y="232" font-size="14" fill="#94a3b8">white_papers</text>
  <g><circle cx="863" cy="165" r="5" fill="#94a3b8" opacity=".35"/><circle cx="897" cy="203" r="5" fill="#94a3b8" opacity=".35"/><circle cx="991" cy="165" r="3" fill="#94a3b8" opacity=".35"/><circle cx="895" cy="163" r="3" fill="#94a3b8" opacity=".35"/><circle cx="867" cy="78" r="5" fill="#94a3b8" opacity=".35"/><circle cx="1033" cy="67" r="5" fill="#94a3b8" opacity=".35"/><circle cx="866" cy="55" r="5" fill="#94a3b8" opacity=".35"/><circle cx="929" cy="203" r="3" fill="#94a3b8" opacity=".35"/><circle cx="992" cy="182" r="5" fill="#94a3b8" opacity=".35"/><circle cx="912" cy="182" r="2" fill="#94a3b8" opacity=".35"/><circle cx="914" cy="57" r="3" fill="#94a3b8" opacity=".35"/><circle cx="953" cy="71" r="3" fill="#94a3b8" opacity=".35"/><circle cx="933" cy="110" r="4" fill="#94a3b8" opacity=".35"/><circle cx="1042" cy="58" r="3" fill="#94a3b8" opacity=".35"/><circle cx="979" cy="72" r="3" fill="#94a3b8" opacity=".35"/><circle cx="940" cy="119" r="3" fill="#94a3b8" opacity=".35"/><circle cx="928" cy="188" r="2" fill="#94a3b8" opacity=".35"/><circle cx="1002" cy="96" r="2" fill="#94a3b8" opacity=".35"/></g>
  <rect x="932" y="88" width="184" height="112" rx="18" fill="#020617" stroke="#475569" stroke-width="2" opacity=".84"/>
  <text x="958" y="126" font-size="16" fill="#e5e7eb">TRACE</text>
  <text x="958" y="156" font-size="16" fill="#94a3b8">VALIDATE</text>
  <text x="958" y="186" font-size="16" fill="#38bdf8">DOCUMENT</text>
</svg>
