name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, example: v0.1.0-research-lab-baseline"
        required: true
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: false
        type: boolean
      notes:
        description: "Optional release notes. Leave blank to generate from recent commits."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ github.event.inputs.version }}"

          case "$VERSION" in
            v[0-9]*)
              echo "version=$VERSION"
              ;;
            *)
              echo "[FAIL] Version must start with v, example: v0.1.0-research-lab-baseline"
              exit 1
              ;;
          esac

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "[FAIL] Tag already exists: $VERSION"
            exit 1
          fi

      - name: Build release notes
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ github.event.inputs.version }}"
          NOTES="${{ github.event.inputs.notes }}"

          {
            echo "# $VERSION"
            echo
            if [ -n "$NOTES" ]; then
              echo "$NOTES"
            else
              echo "## Changes"
              echo
              last_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
              if [ -n "$last_tag" ]; then
                git log --pretty=format:'- %s (%h)' "$last_tag"..HEAD
              else
                git log --pretty=format:'- %s (%h)' -n 30
              fi
              echo
              echo
              echo "## Public-safe scope"
              echo
              echo "- Authorized security research"
              echo "- Defensive detection engineering"
              echo "- Automation and data tooling"
              echo "- No secrets, credentials, or private operational data"
            fi
          } > release-notes.md

          cat release-notes.md

      - name: Create release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          VERSION="${{ github.event.inputs.version }}"
          PRERELEASE="${{ github.event.inputs.prerelease }}"

          if [ "$PRERELEASE" = "true" ]; then
            gh release create "$VERSION" \
              --target "$GITHUB_SHA" \
              --title "$VERSION" \
              --notes-file release-notes.md \
              --prerelease
          else
            gh release create "$VERSION" \
              --target "$GITHUB_SHA" \
              --title "$VERSION" \
              --notes-file release-notes.md \
              --latest
          fi
