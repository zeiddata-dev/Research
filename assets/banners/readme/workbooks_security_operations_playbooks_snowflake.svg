<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Snowflake banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#082f49"/>
      <stop offset="52%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      text { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .scan { animation: scan 7s linear infinite; }
      .pulse { animation: pulse 3.8s ease-in-out infinite; }
      .dash { stroke-dasharray: 12 18; animation: dash 16s linear infinite; }
      @keyframes scan { 0% { transform: translateY(-80px); opacity:.04; } 50% { opacity:.18; } 100% { transform: translateY(330px); opacity:.04; } }
      @keyframes pulse { 0%,100% { opacity:.72; } 50% { opacity:1; } }
      @keyframes dash { to { stroke-dashoffset:-260; } }
    </style>
  </defs>
  <rect width="1200" height="300" rx="28" fill="url(#bg)"/>
  <rect x="20" y="20" width="1160" height="260" rx="22" fill="none" stroke="#334155" stroke-width="2"/>
  <rect class="scan" x="32" y="0" width="1136" height="70" fill="#93c5fd"/>
  <path class="dash" d="M70 228 C190 170, 290 260, 430 192 S645 162, 780 220 S990 238, 1130 154" fill="none" stroke="url(#line)" stroke-width="3" opacity=".55"/>
  <path d="M74 76 H1126" stroke="url(#line)" stroke-width="2" opacity=".42"/>
  <path d="M74 246 H1126" stroke="url(#line)" stroke-width="2" opacity=".26"/>
  <g filter="url(#glow)" class="pulse">
    <rect x="72" y="86" width="114" height="114" rx="24" fill="#020617" stroke="#38bdf8" stroke-width="3"/>
    <path d="M106 174 L151 126 H111 L137 92" fill="none" stroke="#93c5fd" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="164" cy="100" r="7" fill="#22d3ee"/>
    <circle cx="94" cy="190" r="5" fill="#38bdf8"/>
  </g>
  <text x="225" y="118" font-size="42" font-weight="800" fill="#f8fafc">Snowflake</text>
  <text x="228" y="158" font-size="20" fill="#cbd5e1">Snowflake analytics, AI governance, and compliance query packs.</text>
  <text x="228" y="202" font-size="18" fill="#93c5fd">ZEID DATA · SNOWFLAKE · PUBLIC-SAFE</text>
  <text x="228" y="232" font-size="14" fill="#94a3b8">workbooks/Security Operations Playbooks/Snowflake</text>
  <g><circle cx="975" cy="177" r="5" fill="#93c5fd" opacity=".35"/><circle cx="1090" cy="58" r="5" fill="#93c5fd" opacity=".35"/><circle cx="969" cy="71" r="4" fill="#93c5fd" opacity=".35"/><circle cx="926" cy="156" r="2" fill="#93c5fd" opacity=".35"/><circle cx="1001" cy="73" r="3" fill="#93c5fd" opacity=".35"/><circle cx="961" cy="207" r="3" fill="#93c5fd" opacity=".35"/><circle cx="1051" cy="108" r="4" fill="#93c5fd" opacity=".35"/><circle cx="1014" cy="124" r="4" fill="#93c5fd" opacity=".35"/><circle cx="1009" cy="197" r="3" fill="#93c5fd" opacity=".35"/><circle cx="900" cy="91" r="5" fill="#93c5fd" opacity=".35"/><circle cx="984" cy="63" r="3" fill="#93c5fd" opacity=".35"/><circle cx="1050" cy="88" r="3" fill="#93c5fd" opacity=".35"/><circle cx="936" cy="52" r="5" fill="#93c5fd" opacity=".35"/><circle cx="881" cy="209" r="4" fill="#93c5fd" opacity=".35"/><circle cx="1087" cy="173" r="4" fill="#93c5fd" opacity=".35"/><circle cx="1021" cy="134" r="4" fill="#93c5fd" opacity=".35"/><circle cx="904" cy="64" r="3" fill="#93c5fd" opacity=".35"/><circle cx="1077" cy="108" r="5" fill="#93c5fd" opacity=".35"/></g>
  <rect x="932" y="88" width="184" height="112" rx="18" fill="#020617" stroke="#475569" stroke-width="2" opacity=".84"/>
  <text x="958" y="126" font-size="16" fill="#38bdf8">TRACE</text>
  <text x="958" y="156" font-size="16" fill="#93c5fd">VALIDATE</text>
  <text x="958" y="186" font-size="16" fill="#22d3ee">DOCUMENT</text>
