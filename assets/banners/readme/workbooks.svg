<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Workbooks banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#082f49"/>
      <stop offset="52%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      text { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .scan { animation: scan 7s linear infinite; }
      .pulse { animation: pulse 3.8s ease-in-out infinite; }
      .dash { stroke-dasharray: 12 18; animation: dash 16s linear infinite; }
      @keyframes scan { 0% { transform: translateY(-80px); opacity:.04; } 50% { opacity:.18; } 100% { transform: translateY(330px); opacity:.04; } }
      @keyframes pulse { 0%,100% { opacity:.72; } 50% { opacity:1; } }
      @keyframes dash { to { stroke-dashoffset:-260; } }
    </style>
  </defs>
  <rect width="1200" height="300" rx="28" fill="url(#bg)"/>
  <rect x="20" y="20" width="1160" height="260" rx="22" fill="none" stroke="#334155" stroke-width="2"/>
  <rect class="scan" x="32" y="0" width="1136" height="70" fill="#2563eb"/>
  <path class="dash" d="M70 228 C190 170, 290 260, 430 192 S645 162, 780 220 S990 238, 1130 154" fill="none" stroke="url(#line)" stroke-width="3" opacity=".55"/>
  <path d="M74 76 H1126" stroke="url(#line)" stroke-width="2" opacity=".42"/>
  <path d="M74 246 H1126" stroke="url(#line)" stroke-width="2" opacity=".26"/>
  <g filter="url(#glow)" class="pulse">
    <rect x="72" y="86" width="114" height="114" rx="24" fill="#020617" stroke="#22d3ee" stroke-width="3"/>
    <path d="M106 174 L151 126 H111 L137 92" fill="none" stroke="#2563eb" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="164" cy="100" r="7" fill="#22c55e"/>
    <circle cx="94" cy="190" r="5" fill="#22d3ee"/>
  </g>
  <text x="225" y="118" font-size="42" font-weight="800" fill="#f8fafc">Workbooks</text>
  <text x="228" y="158" font-size="20" fill="#cbd5e1">Dashboard, workbook, and visual analytics artifacts.</text>
  <text x="228" y="202" font-size="18" fill="#2563eb">ZEID DATA · WORKBOOKS · PUBLIC-SAFE</text>
  <text x="228" y="232" font-size="14" fill="#94a3b8">workbooks</text>
  <g><circle cx="928" cy="182" r="2" fill="#2563eb" opacity=".35"/><circle cx="908" cy="129" r="2" fill="#2563eb" opacity=".35"/><circle cx="1084" cy="125" r="2" fill="#2563eb" opacity=".35"/><circle cx="1022" cy="150" r="5" fill="#2563eb" opacity=".35"/><circle cx="917" cy="102" r="2" fill="#2563eb" opacity=".35"/><circle cx="918" cy="125" r="5" fill="#2563eb" opacity=".35"/><circle cx="1028" cy="97" r="4" fill="#2563eb" opacity=".35"/><circle cx="1083" cy="110" r="2" fill="#2563eb" opacity=".35"/><circle cx="1038" cy="146" r="3" fill="#2563eb" opacity=".35"/><circle cx="854" cy="124" r="2" fill="#2563eb" opacity=".35"/><circle cx="1000" cy="62" r="4" fill="#2563eb" opacity=".35"/><circle cx="1036" cy="121" r="5" fill="#2563eb" opacity=".35"/><circle cx="956" cy="129" r="2" fill="#2563eb" opacity=".35"/><circle cx="1082" cy="97" r="5" fill="#2563eb" opacity=".35"/><circle cx="1080" cy="63" r="5" fill="#2563eb" opacity=".35"/><circle cx="1058" cy="50" r="2" fill="#2563eb" opacity=".35"/><circle cx="847" cy="164" r="4" fill="#2563eb" opacity=".35"/><circle cx="873" cy="68" r="2" fill="#2563eb" opacity=".35"/></g>
  <rect x="932" y="88" width="184" height="112" rx="18" fill="#020617" stroke="#475569" stroke-width="2" opacity=".84"/>
  <text x="958" y="126" font-size="16" fill="#22d3ee">TRACE</text>
  <text x="958" y="156" font-size="16" fill="#2563eb">VALIDATE</text>
  <text x="958" y="186" font-size="16" fill="#22c55e">DOCUMENT</text>
