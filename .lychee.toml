# Zeid Data Research link checker config.
# Keep this strict for local/repo links, tolerant for noisy external services.

accept = [200, 204, 206, 301, 302, 429]
max_retries = 2
timeout = 20
exclude_all_private = true

exclude = [
  "^mailto:",
  "^tel:",
  "^https://img\\.shields\\.io/",
  "^https://github\\.com/zeiddata-dev/Research/actions/workflows/",
  "^https://raw\\.githubusercontent\\.com/"
]
